# ==============================================
# BOUNTY CONFIGURATION
# ==============================================
# Note:
# - Adjust these values to fit your server's economy and requirements.
# - After editing: restart the server or run `/bounty reload`.

bounty:
  # The minimum amount of money required to place a bounty.
  min-amount: 100

  # The maximum amount of money allowed for a single bounty contribution.
  # Set to 0 for unlimited (only bound by the economy plugin's safe limits).
  max-amount: 0

  # The percentage of the contribution refunded to the player upon cancellation.
  # E.g., 80 means the player gets 80% back, and 20% is taken as a penalty.
  cancel-refund-percent: 80

anti-abuse:
  # Anti-abuse cooldown (in seconds) for the same killer-target pair.
  # Prevents the same killer from repeatedly claiming bounties on the same target.
  claim-cooldown-seconds-per-pair: 3600

gui:
  # The number of target item slots displayed per page in the GUI.
  page-size: 28

messages:
  # The prefix prepended to all plugin chat messages.
  prefix: "[Bounty] "

  # Enable modern/beautified chat formatting using Adventure.
  # If false, falls back to legacy/plain styling.
  beautify: true

  # Broadcast a message to the entire server when a new bounty is placed.
  broadcast-place: true

  # Broadcast a message to the entire server when a bounty is claimed.
  broadcast-claim: true

storage:
  # Database backend storage type: "sqlite" or "mysql".
  # Use "sqlite" for simple single-server setups.
  # Use "mysql" for performance and network setups.
  type: "sqlite"

  mysql:
    # These settings are only active if storage.type is set to "mysql".
    host: "127.0.0.1"
    port: 3306
    database: "bounty"
    username: "root"
    password: ""
    use-ssl: false

discord:
  # Set to true to send bounty events to a Discord channel.
  enabled: false

  # The Discord Webhook URL. Required if discord.enabled is true.
  webhook-url: ""

  # The username displayed for the Discord webhook message.
  username: "Bounty"

  # The URL of the image to use as the webhook's avatar. Leave blank for default.
  avatar-url: ""

  embed:
    # The text shown in the footer of the Discord embed messages.
    footer-text: "Bounty"

    # Show timestamps on the Discord embed messages.
    show-timestamp: true

    # The border colors for Discord embeds (HEX format).
    colors:
      place: "#F1C40F"   # Yellow - Bounty placed
      claim: "#2ECC71"   # Green - Bounty claimed
      cancel: "#E74C3C"  # Red - Bounty cancelled
      admin: "#3498DB"   # Blue - Admin action

  events:
    # Toggle which events trigger a Discord webhook notification.
    place: true
    claim: true
    cancel: true
    admin: true

