bounty:
  min-amount: 100
  max-amount: 0
  cancel-refund-percent: 80

anti-abuse:
  claim-cooldown-seconds-per-pair: 3600

gui:
  page-size: 28

messages:
  broadcast-place: true
  broadcast-claim: true

storage:
  type: "sqlite" # sqlite or mysql
  mysql:
    host: "127.0.0.1"
    port: 3306
    database: "bounty"
    username: "root"
    password: ""
    use-ssl: false

discord:
  enabled: false
  webhook-url: ""
  username: "Bounty"
  avatar-url: ""
  embed:
    footer-text: "Bounty"
    show-timestamp: true
    colors:
      place: "#F1C40F"
      claim: "#2ECC71"
      cancel: "#E74C3C"
      admin: "#3498DB"
  events:
    place: true
    claim: true
    cancel: true
    admin: true
